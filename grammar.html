
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Grammar Guardian</title>
    
    <!-- Google Fonts: Nunito for comfort reading -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Shake animation for incorrect answers */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px) rotate(-1deg); }
            40% { transform: translateX(10px) rotate(1deg); }
            60% { transform: translateX(-10px) rotate(-1deg); }
            80% { transform: translateX(10px) rotate(1deg); }
        }
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Smooth background transitions */
        #game-container {
            transition: background-color 0.3s ease;
        }
        .bg-error {
            background-color: #450a0a !important; /* red-950 */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- App Container -->
    <div id="game-container" class="flex-grow flex flex-col p-4 md:p-8 w-full transition-colors duration-300">
        
        <!-- ==========================================
             SCREEN 1: MAIN MENU
             ========================================== -->
        <div id="screen-menu" class="flex-grow flex flex-col items-center justify-center w-full max-w-3xl mx-auto">
            <i class="fa-solid fa-rocket text-6xl md:text-7xl text-cyan-400 mb-6 animate-bounce"></i>
            <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-2 text-center tracking-tight leading-tight">
                COSMIC GRAMMAR<br>GUARDIAN
            </h1>
            <p class="text-xl md:text-2xl text-slate-400 mb-10 font-bold text-center">
                Select Your Training Mission!
            </p>

            <div id="mission-list" class="w-full flex flex-col gap-4">
                <!-- Mission buttons injected via JS -->
            </div>
        </div>

        <!-- ==========================================
             SCREEN 2: PLAYING GAME
             ========================================== -->
        <div id="screen-game" class="hidden flex-grow flex flex-col w-full max-w-4xl mx-auto">
            
            <!-- HUD (Heads Up Display) -->
            <div class="flex justify-between items-center mb-6">
                <button onclick="returnToMenu()" class="p-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors border-b-4 border-slate-700 active:translate-y-1 active:border-b-0">
                    <i class="fa-solid fa-house text-xl md:text-2xl"></i>
                </button>
                
                <div class="flex-grow mx-4 md:mx-8">
                    <div class="flex justify-between text-lg md:text-xl font-bold text-slate-400 mb-2">
                        <span id="hud-mission-title">Mission</span>
                        <span id="hud-progress-text">1 / 10</span>
                    </div>
                    <div class="w-full h-4 bg-slate-800 rounded-full overflow-hidden">
                        <div id="hud-progress-bar" class="h-full bg-blue-500 transition-all duration-500 rounded-full" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="bg-slate-800 px-4 md:px-6 py-2 md:py-3 rounded-xl border-b-4 border-slate-700 flex items-center gap-2">
                    <i class="fa-solid fa-bolt text-yellow-400 text-xl md:text-2xl"></i>
                    <span id="hud-score" class="text-2xl md:text-3xl font-black">0</span>
                </div>
            </div>

            <!-- Play Area -->
            <div id="play-area" class="flex-grow flex flex-col justify-center items-center w-full">
                
                <!-- Question Card -->
                <div class="w-full bg-slate-800 rounded-3xl p-6 md:p-10 border-4 border-slate-700 shadow-2xl mb-8 md:mb-12 text-center relative overflow-hidden">
                    
                    <!-- Feedback Overlays -->
                    <div id="overlay-correct" class="hidden absolute inset-0 bg-green-500/20 flex items-center justify-center z-0">
                        <i class="fa-solid fa-check text-8xl text-green-400 opacity-50"></i>
                    </div>
                    <div id="overlay-incorrect" class="hidden absolute inset-0 bg-red-500/20 flex items-center justify-center z-0">
                        <i class="fa-solid fa-xmark text-8xl text-red-400 opacity-50"></i>
                    </div>
                    
                    <h2 id="question-text" class="text-3xl md:text-5xl font-black leading-tight text-white relative z-10 break-words">
                        Question goes here?
                    </h2>
                </div>

                <!-- Options Grid -->
                <div id="options-container" class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mt-auto md:mt-0">
                    <!-- Buttons injected via JS -->
                </div>
            </div>
        </div>

        <!-- ==========================================
             SCREEN 3: GAME OVER
             ========================================== -->
        <div id="screen-game-over" class="hidden flex-grow flex flex-col items-center justify-center w-full max-w-md mx-auto">
            <div class="w-full bg-slate-800 rounded-3xl p-8 border-4 border-slate-700 shadow-2xl text-center flex flex-col items-center">
                
                <div id="game-over-icon-container">
                    <!-- Icon injected via JS -->
                </div>
                
                <h2 class="text-4xl font-black mb-2 text-white">MISSION COMPLETE!</h2>
                <p id="game-over-mission" class="text-2xl text-slate-400 mb-8 font-bold">Mission Title</p>
                
                <div class="bg-slate-900 w-full rounded-2xl p-6 mb-8 border-2 border-slate-700">
                    <p class="text-2xl text-slate-400 font-bold mb-2">Final Score</p>
                    <p id="game-over-score" class="text-6xl font-black text-cyan-400">0</p>
                    <p id="game-over-perfect" class="hidden text-xl text-yellow-400 font-bold mt-4">PERFECT SCORE!</p>
                </div>

                <button onclick="returnToMenu()" class="w-full bg-blue-500 text-white font-black py-5 px-6 rounded-2xl border-b-8 border-blue-700 hover:bg-blue-400 active:border-b-0 active:translate-y-2 transition-all text-2xl flex items-center justify-center gap-3">
                    <i class="fa-solid fa-house"></i>
                    Back to Base
                </button>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        // --- GAME DATA ---
        const MISSIONS = [
            {
                id: 'tenses',
                title: 'Mission 1: Time Tenses',
                icon: 'fa-clock',
                color: 'bg-blue-500',
                borderColor: 'border-blue-700',
                questions: [
                    { q: "Simple Present (Positive): He ___ breakfast.", options: ["eats", "is eating", "ate"], a: "eats" },
                    { q: "Simple Present (Negative): He ___ breakfast.", options: ["does not eat", "did not eat", "is not eating"], a: "does not eat" },
                    { q: "Present Continuous: Look! He ___ right now.", options: ["is eating", "was eating", "eats"], a: "is eating" },
                    { q: "Present Continuous (Question): ___ he eating now?", options: ["Is", "Does", "Was"], a: "Is" },
                    { q: "Simple Past: Yesterday, he ___ a sandwich.", options: ["ate", "eats", "was eating"], a: "ate" },
                    { q: "Simple Past (Negative): He ___ a sandwich yesterday.", options: ["did not eat", "does not eat", "was not eating"], a: "did not eat" },
                    { q: "Past Continuous: He ___ at 10 PM last night.", options: ["was eating", "is eating", "ate"], a: "was eating" }
                ]
            },
            {
                id: 'apostrophes',
                title: 'Mission 2: Astro-Apostrophes',
                icon: 'fa-star',
                color: 'bg-orange-500',
                borderColor: 'border-orange-700',
                questions: [
                    { q: "Contraction: What does 'They'll' stand for?", options: ["They will", "They all", "They are"], a: "They will" },
                    { q: "Contraction: What does 'Haven't' stand for?", options: ["Have not", "Has not", "Had not"], a: "Have not" },
                    { q: "Contraction: What does 'I've' stand for?", options: ["I have", "I love", "I give"], a: "I have" },
                    { q: "Possession (One Boy): The ___ camera was broken.", options: ["boy's", "boys'", "boys"], a: "boy's" },
                    { q: "Possession (Many Girls): The ___ skateboards are green.", options: ["girls'", "girl's", "girls"], a: "girls'" },
                    { q: "Possession (Irregular Plural): The ___ skates are new.", options: ["children's", "childrens'", "childrens"], a: "children's" }
                ]
            },
            {
                id: 'passive',
                title: 'Mission 3: Passive Portals',
                icon: 'fa-shield-halved',
                color: 'bg-purple-500',
                borderColor: 'border-purple-700',
                questions: [
                    { q: "Change to Passive: The police arrest the thief.", options: ["The thief is arrested by the police.", "The thief was arrested by the police.", "The thief arrests the police."], a: "The thief is arrested by the police." },
                    { q: "Change to Passive: Ahmed repaired the computer.", options: ["The computer was repaired by Ahmed.", "The computer is repaired by Ahmed.", "Ahmed was repaired by the computer."], a: "The computer was repaired by Ahmed." },
                    { q: "Change to Passive: Mother is baking a cake.", options: ["A cake is being baked by Mother.", "A cake was baked by Mother.", "A cake is baked by Mother."], a: "A cake is being baked by Mother." }
                ]
            },
            {
                id: 'vocabulary',
                title: 'Mission 4: Void Vocabulary',
                icon: 'fa-book-open',
                color: 'bg-emerald-500',
                borderColor: 'border-emerald-700',
                questions: [
                    { q: "Because the leopard was hurt, it was an easy ___ for poachers.", options: ["target", "friend", "meal"], a: "target" },
                    { q: "Hitler's troops ___ Poland on Sep 01, 1939.", options: ["invaded", "assisted", "revealed"], a: "invaded" },
                    { q: "Spying for the enemy in your own country is called ___.", options: ["treason", "poaching", "satisfaction"], a: "treason" },
                    { q: "What is the OPPOSITE of 'Betray'?", options: ["Assist", "Reveal", "Endure"], a: "Assist" },
                    { q: "What is the OPPOSITE of 'Reveal'?", options: ["Conceal", "Gather", "Enlist"], a: "Conceal" },
                    { q: "What is the OPPOSITE of 'Nervously'?", options: ["Calmly", "Quickly", "Angrily"], a: "Calmly" }
                ]
            }
        ];

        // --- STATE VARIABLES ---
        let currentMissionIndex = 0;
        let currentQuestionIndex = 0;
        let score = 0;
        let isWaitingForNext = false;
        let audioCtx = null;

        // --- DOM ELEMENTS ---
        const elGameContainer = document.getElementById('game-container');
        const elScreenMenu = document.getElementById('screen-menu');
        const elScreenGame = document.getElementById('screen-game');
        const elScreenGameOver = document.getElementById('screen-game-over');
        
        const elMissionList = document.getElementById('mission-list');
        const elPlayArea = document.getElementById('play-area');
        
        const elHudMissionTitle = document.getElementById('hud-mission-title');
        const elHudProgressText = document.getElementById('hud-progress-text');
        const elHudProgressBar = document.getElementById('hud-progress-bar');
        const elHudScore = document.getElementById('hud-score');
        
        const elQuestionText = document.getElementById('question-text');
        const elOptionsContainer = document.getElementById('options-container');
        const elOverlayCorrect = document.getElementById('overlay-correct');
        const elOverlayIncorrect = document.getElementById('overlay-incorrect');

        // --- AUDIO SYSTEM ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'incorrect') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'start') {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.4);
                }
            } catch (e) {
                console.log("Audio play failed", e);
            }
        }

        // --- INITIALIZATION ---
        function renderMenu() {
            elMissionList.innerHTML = '';
            MISSIONS.forEach((mission, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full ${mission.color} text-white font-black py-5 px-6 rounded-2xl border-b-8 ${mission.borderColor} hover:opacity-90 active:border-b-0 active:translate-y-2 transition-all shadow-xl flex items-center justify-between group`;
                btn.onclick = () => startGame(index);
                
                btn.innerHTML = `
                    <div class="flex items-center gap-4 text-left pointer-events-none">
                        <div class="bg-white/20 p-3 rounded-xl flex items-center justify-center w-14 h-14">
                            <i class="fa-solid ${mission.icon} text-2xl md:text-3xl"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl md:text-3xl tracking-wide">${mission.title}</h2>
                            <p class="text-lg md:text-xl text-white/80 font-bold">${mission.questions.length} Challenges</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-play text-2xl md:text-3xl opacity-50 group-hover:opacity-100 group-hover:translate-x-2 transition-all hidden sm:block pointer-events-none"></i>
                `;
                elMissionList.appendChild(btn);
            });
        }

        // --- GAME FLOW ---
        function switchScreen(screenId) {
            elScreenMenu.classList.add('hidden');
            elScreenGame.classList.add('hidden');
            elScreenGameOver.classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function startGame(missionIndex) {
            playSound('start');
            currentMissionIndex = missionIndex;
            currentQuestionIndex = 0;
            score = 0;
            isWaitingForNext = false;
            
            const mission = MISSIONS[currentMissionIndex];
            elHudMissionTitle.textContent = mission.title;
            
            // Set progress bar color to match mission
            elHudProgressBar.className = `h-full ${mission.color} transition-all duration-500 rounded-full`;
            
            updateHUD();
            loadQuestion();
            switchScreen('screen-game');
        }

        function returnToMenu() {
            playSound('start');
            switchScreen('screen-menu');
            // Reset background color in case they exit during an error state
            elGameContainer.classList.remove('bg-error'); 
        }

        function updateHUD() {
            const mission = MISSIONS[currentMissionIndex];
            elHudScore.textContent = score;
            elHudProgressText.textContent = `${currentQuestionIndex + 1} / ${mission.questions.length}`;
            
            const progressPct = (currentQuestionIndex / mission.questions.length) * 100;
            elHudProgressBar.style.width = `${progressPct}%`;
        }

        function loadQuestion() {
            const mission = MISSIONS[currentMissionIndex];
            const question = mission.questions[currentQuestionIndex];
            
            // Reset UI
            elQuestionText.textContent = question.q;
            elOptionsContainer.innerHTML = '';
            elOverlayCorrect.classList.add('hidden');
            elOverlayIncorrect.classList.add('hidden');
            elPlayArea.classList.remove('animate-shake');
            elGameContainer.classList.remove('bg-error');

            // Render options
            question.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full py-6 md:py-8 px-6 rounded-2xl border-b-8 font-black text-2xl md:text-3xl transition-all duration-300 bg-slate-700 border-slate-800 hover:bg-slate-600 active:border-b-0 active:translate-y-2 flex items-center justify-center text-center break-words`;
                btn.style.minHeight = '100px';
                btn.textContent = opt;
                
                // Store the actual option text as a dataset attribute to avoid innerHTML parsing issues
                btn.dataset.option = opt; 
                
                btn.onclick = (e) => handleAnswer(e.currentTarget);
                elOptionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(btnElement) {
            if (isWaitingForNext) return;
            isWaitingForNext = true;

            const mission = MISSIONS[currentMissionIndex];
            const question = mission.questions[currentQuestionIndex];
            const selectedOption = btnElement.dataset.option;
            const isCorrect = (selectedOption === question.a);

            // Disable all buttons
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.disabled = true;
                b.classList.remove('hover:bg-slate-600', 'active:border-b-0', 'active:translate-y-2');
                
                // Highlight logic
                if (b.dataset.option === question.a) {
                    // Correct answer becomes green
                    b.className = `option-btn w-full py-6 md:py-8 px-6 rounded-2xl border-b-8 font-black text-2xl md:text-3xl transition-all duration-300 bg-green-500 border-green-700 text-white scale-[1.02] z-10 shadow-[0_0_30px_rgba(34,197,94,0.4)] flex items-center justify-center text-center break-words`;
                } else {
                    // Incorrect answers fade out
                    b.className = `option-btn w-full py-6 md:py-8 px-6 rounded-2xl border-b-8 font-black text-2xl md:text-3xl transition-all duration-300 bg-slate-800 border-slate-900 text-slate-500 opacity-50 scale-95 flex items-center justify-center text-center break-words`;
                }
            });

            if (isCorrect) {
                playSound('correct');
                score += 100;
                elOverlayCorrect.classList.remove('hidden');
            } else {
                playSound('incorrect');
                elOverlayIncorrect.classList.remove('hidden');
                elPlayArea.classList.add('animate-shake');
                elGameContainer.classList.add('bg-error');
            }

            updateHUD();

            // Wait, then load next or end
            setTimeout(() => {
                isWaitingForNext = false;
                if (currentQuestionIndex + 1 < mission.questions.length) {
                    currentQuestionIndex++;
                    updateHUD();
                    loadQuestion();
                } else {
                    showGameOver();
                }
            }, 1800);
        }

        function showGameOver() {
            const mission = MISSIONS[currentMissionIndex];
            const maxScore = mission.questions.length * 100;
            const isPerfect = (score === maxScore);
            
            // Set text
            document.getElementById('game-over-mission').textContent = mission.title;
            document.getElementById('game-over-score').textContent = score;
            
            // Set Icon & Perfect Tag
            const iconContainer = document.getElementById('game-over-icon-container');
            const perfectTag = document.getElementById('game-over-perfect');
            
            if (isPerfect) {
                iconContainer.innerHTML = `<i class="fa-solid fa-star text-7xl md:text-8xl text-yellow-400 mb-6 animate-pulse drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]"></i>`;
                perfectTag.classList.remove('hidden');
            } else {
                iconContainer.innerHTML = `<i class="fa-solid fa-shield-halved text-7xl md:text-8xl text-cyan-400 mb-6"></i>`;
                perfectTag.classList.add('hidden');
            }

            switchScreen('screen-game-over');
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
        });

    </script>
</body>
</html>
