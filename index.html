
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albaraa's Learning Portal</title>
    
    <!-- Google Fonts: Nunito for comfort reading -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Float animation for the main avatar/icon */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Toast slide up animation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-enter {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiMwZjE3MmEiLz48Y2lyY2xlIGN4PSIxIiBjeT0iMSIgcj0iMSIgZmlsbD0iIzFlMjkzYiIvPjwvc3ZnPg==')]">

    <div class="flex-grow flex flex-col items-center justify-center p-4 md:p-8 w-full max-w-4xl mx-auto relative">
        
        <!-- Welcome Header -->
        <div class="text-center mb-10 md:mb-16">
            <div class="inline-block bg-slate-800 p-6 rounded-full border-4 border-slate-700 mb-6 animate-float shadow-2xl shadow-cyan-500/20">
                <i class="fa-solid fa-user-astronaut text-6xl md:text-8xl text-cyan-400"></i>
            </div>
            <h2 class="text-2xl md:text-3xl text-slate-400 font-bold tracking-widest uppercase mb-2">Command Center</h2>
            <h1 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 tracking-tight leading-tight">
                CMDR. ALBARAA
            </h1>
            <p class="text-xl md:text-2xl text-slate-400 mt-4 font-bold">
                Select your next training sector:
            </p>
        </div>

        <!-- Portal Buttons Grid (Now using anchor <a> tags) -->
        <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
            
            <!-- MATH LINK -->
            <a href="#" onclick="handleModuleClick(event, 'Math')" class="w-full bg-rose-500 text-white font-black py-8 px-6 rounded-3xl border-b-8 border-rose-700 hover:opacity-90 active:border-b-0 active:translate-y-2 transition-all shadow-[0_10px_30px_rgba(244,63,94,0.3)] flex flex-col items-center justify-center group cursor-pointer no-underline">
                <div class="bg-white/20 p-5 rounded-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-calculator text-4xl md:text-5xl"></i>
                </div>
                <span class="text-3xl md:text-4xl tracking-wide">MATH</span>
                <span class="text-rose-200 mt-2 font-bold bg-rose-700/50 px-3 py-1 rounded-full text-sm">Sector 1</span>
            </a>

            <!-- SCIENCE LINK -->
            <a href="#" onclick="handleModuleClick(event, 'Science')" class="w-full bg-emerald-500 text-white font-black py-8 px-6 rounded-3xl border-b-8 border-emerald-700 hover:opacity-90 active:border-b-0 active:translate-y-2 transition-all shadow-[0_10px_30px_rgba(16,185,129,0.3)] flex flex-col items-center justify-center group md:-translate-y-4 cursor-pointer no-underline">
                <div class="bg-white/20 p-5 rounded-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-flask text-4xl md:text-5xl"></i>
                </div>
                <span class="text-3xl md:text-4xl tracking-wide">SCIENCE</span>
                <span class="text-emerald-200 mt-2 font-bold bg-emerald-700/50 px-3 py-1 rounded-full text-sm">Sector 2</span>
            </a>

            <!-- ENGLISH LINK (Points to index.html) -->
            <a href="grammar.html" onclick="launchEnglish(event)" class="w-full bg-blue-500 text-white font-black py-8 px-6 rounded-3xl border-b-8 border-blue-700 hover:opacity-90 active:border-b-0 active:translate-y-2 transition-all shadow-[0_10px_30px_rgba(59,130,246,0.3)] flex flex-col items-center justify-center group relative overflow-hidden cursor-pointer no-underline">
                <!-- Sparkle effect for active module -->
                <div class="absolute top-0 right-0 p-4">
                    <i class="fa-solid fa-star text-yellow-300 animate-pulse text-2xl"></i>
                </div>
                <div class="bg-white/20 p-5 rounded-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-book-open text-4xl md:text-5xl"></i>
                </div>
                <span class="text-3xl md:text-4xl tracking-wide">ENGLISH</span>
                <span class="text-blue-200 mt-2 font-bold bg-blue-700/50 px-3 py-1 rounded-full text-sm">Sector 3 - ACTIVE</span>
            </a>

        </div>

        <!-- Toast Notification Container -->
        <div id="toast-container" class="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none z-50"></div>
    </div>

    <!-- Application Logic -->
    <script>
        // Audio setup for arcade UI feel
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'launch') {
                    // Ascending major chord arpeggio
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1); // C#
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); // E
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3); // A
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.5);
                } else if (type === 'locked') {
                    // Low double thud
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime + 0.2);
                    oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime + 0.2);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.4);
                }
            } catch (e) {
                console.log("Audio play failed", e);
            }
        }

        // Handle clicking English (Launch Game)
        function launchEnglish(event) {
            // Prevent the link from jumping immediately so we can play the animation/sound
            event.preventDefault();
            
            playSound('launch');
            showToast('🚀 Launching English Missions...', 'bg-blue-600');
            
           
        }

        // Handle clicking Math or Science (Locked/Coming Soon)
        function handleModuleClick(event, moduleName) {
            // Prevent default jump-to-top behavior of an empty '#' href
            event.preventDefault(); 
            
            playSound('locked');
            showToast(`🔒 ${moduleName} Missions are currently locked. Coming soon!`, 'bg-slate-800 border-2 border-slate-600');
        }

        // Toast Notification System
        function showToast(message, colorClasses) {
            const container = document.getElementById('toast-container');
            
            // Clear existing toasts to prevent spam
            container.innerHTML = '';
            
            const toast = document.createElement('div');
            toast.className = `toast-enter ${colorClasses} text-white px-6 py-4 rounded-2xl font-black text-xl shadow-2xl flex items-center gap-3`;
            toast.innerHTML = message;
            
            container.appendChild(toast);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(100%)';
                toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => {
                    if(container.contains(toast)) container.removeChild(toast);
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
